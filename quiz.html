<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ Chérie Ciné: What Genre Reflects Your Movie Taste? ✦</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            /* LINK FOTO BACKGROUND AWAN PINTEREST KAMU */
            background: url('https://pinimg.com') no-repeat center center fixed;
            background-size: cover;
            color: #4a3b4a; 
            font-family: Arial, Helvetica, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            letter-spacing: 0.5px;
        }
        
        /* Card Transparan Glassmorphism Premium Bingkai uQuiz */
        .card-container { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 20px 25px 20px; 
            border-radius: 35px; 
            box-shadow: 0 20px 50px rgba(255, 182, 193, 0.3); 
            max-width: 550px; 
            width: 100%; 
            text-align: center; 
            border: 3px solid rgba(255, 255, 255, 0.9);
            position: relative;
        }
        .decor { font-size: 32px; margin-bottom: 5px; display: inline-block; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        
        h1 { color: #ff7597; font-size: 36px; margin-bottom: 2px; text-shadow: 1px 1px #fff; font-weight: bold; line-height: 1.2; }
        .sub-title { color: #ff8ebb; font-size: 15px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        /* KOTAK EMBED JENDELA UQUIZ LIVE */
        .uquiz-frame-wrapper {
            width: 100%;
            height: 580px; 
            border-radius: 22px;
            overflow: hidden;
            border: 2px solid #ffcad4;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        iframe { width: 100%; height: 100%; border: none; }

        .credit-text { margin-top: 20px; font-size: 12px; color: #bfa3b0; font-style: italic; letter-spacing: 2px; text-shadow: 1px 1px #fff; }
    </style>
</head>
<body>

<div style="text-align: center; width: 100%; max-width: 550px;">
    <div class="card-container">
        <span class="decor">🎞️</span>
        <h1>Chérie Ciné</h1>
        <div class="sub-title">What Genre Reflects Your Movie Taste?</div>
        
        <!-- JENDELA INTEGRASI LINK UQUIZ KAMU SUDAH TERTANAM AKTIF DI SINI -->
        <div class="uquiz-frame-wrapper">
            <iframe src="https://uquiz.com/DuEP7R" title="uQuiz Cafe drink"></iframe>
        </div>
        
    </div>
    
    <div class="credit-text">♡ by nadhira aurora ♡</div>
</div>

</body>
</html>
